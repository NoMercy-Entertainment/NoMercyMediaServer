name: Test and Create Pull Request to Master

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
    branches:
      - dev
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  test_and_create_pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Setup .NET SDK for the NoMercy.Server project
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # Restore dependencies for the NoMercy.Server project
      - name: Restore dependencies
        run: dotnet restore NoMercy.Server.sln

      # Run tests
      - name: Test
        run: >
          dotnet test NoMercy.Server.sln 
          --configuration Release
          --collect:"XPlat Code Coverage"
          --settings tests/coverletArgs.runsettings
          --verbosity minimal

      # Directly merge from dev to master
      - name: Merge Dev into Master
        if: success()
        run: |
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            
            git remote update
            git fetch origin
            
            git checkout -b master origin/master
        
            git merge origin/dev --allow-unrelated-histories -X theirs
        
            git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}