name: 'Test Workflow'

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: '.NET version to use'
        required: false
        type: string
        default: '9.0.x'

jobs:
  # Fast tests that run on every push/PR
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Setup .NET Environment
        uses: ./.github/actions/setup-dotnet
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install FFmpeg (NoMercy release, latest)
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/NoMercy-Entertainment/NoMercyFFMpeg/releases/latest"
          echo "Querying $API_URL"
          # Pick the asset matching the runner OS and architecture
          OS_NAME=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH_NAME=$(uname -m)
          case "$ARCH_NAME" in
            x86_64|amd64) ARCH_PATTERN="x86_64|amd64|x64" ;;
            aarch64|arm64) ARCH_PATTERN="arm64|aarch64" ;;
            *) ARCH_PATTERN="$ARCH_NAME" ;;
          esac
          case "$OS_NAME" in
            linux) OS_PATTERN="linux" ;;
            darwin|mac*) OS_PATTERN="darwin|mac|macos" ;;
            msys*|mingw*|cygwin*|windows) OS_PATTERN="windows|win" ;;
            *) OS_PATTERN="$OS_NAME" ;;
          esac

          download_url=$(curl -s "$API_URL" | jq -r --arg osp "$OS_PATTERN" --arg archp "$ARCH_PATTERN" '.assets[] | select((.name|ascii_downcase) | test($osp) and test($archp)) | .browser_download_url' | head -n1)
          if [ -z "$download_url" ]; then
            # fallback: match by arch only
            download_url=$(curl -s "$API_URL" | jq -r --arg archp "$ARCH_PATTERN" '.assets[] | select((.name|ascii_downcase) | test($archp)) | .browser_download_url' | head -n1)
          fi
          if [ -z "$download_url" ]; then
            # fallback: match by os only
            download_url=$(curl -s "$API_URL" | jq -r --arg osp "$OS_PATTERN" '.assets[] | select((.name|ascii_downcase) | test($osp)) | .browser_download_url' | head -n1)
          fi
          if [ -z "$download_url" ]; then
            # final fallback: first asset
            download_url=$(curl -s "$API_URL" | jq -r '.assets[0].browser_download_url // ""')
          fi
          if [ -z "$download_url" ]; then echo "No download URL found for FFmpeg release"; exit 1; fi
          echo "Found FFmpeg asset: $download_url"
          TMPDIR=$(mktemp -d)
          asset_name=$(basename "$download_url")
          asset="$TMPDIR/$asset_name"
          curl -L -o "$asset" "$download_url"
          DEST="$HOME/.local/share/NoMercy/root/binaries/ffmpeg"
          mkdir -p "$DEST"
          case "$asset" in
            *.zip)
              unzip -o "$asset" -d "$TMPDIR/extract"
              ;;
            *.tar.gz|*.tgz)
              mkdir -p "$TMPDIR/extract" && tar -xzf "$asset" -C "$TMPDIR/extract"
              ;;
            *.tar.xz)
              mkdir -p "$TMPDIR/extract" && tar -xJf "$asset" -C "$TMPDIR/extract"
              ;;
            *)
              # treat as raw binary
              cp "$asset" "$DEST/ffmpeg"
              chmod +x "$DEST/ffmpeg"
              echo "Installed raw ffmpeg to $DEST/ffmpeg"
              exit 0
              ;;
          esac
          found=$(find "$TMPDIR/extract" -type f -name "ffmpeg" -print -quit || true)
          if [ -z "$found" ]; then
            found=$(find "$TMPDIR/extract" -type f -name "ffmpeg*" -print -quit || true)
          fi
          if [ -z "$found" ]; then
            echo "ffmpeg binary not found inside archive. Listing contents:"; ls -R "$TMPDIR/extract"; exit 1
          fi
          # copy main ffmpeg binary
          cp "$found" "$DEST/ffmpeg"
          chmod +x "$DEST/ffmpeg"

          # also try to locate and install ffprobe / ffplay if present in archive
          ffprobe_found=$(find "$TMPDIR/extract" -type f -name "ffprobe" -print -quit || true)
          if [ -n "$ffprobe_found" ]; then
            cp "$ffprobe_found" "$DEST/ffprobe"
            chmod +x "$DEST/ffprobe"
            echo "Installed ffprobe to $DEST/ffprobe"
          fi
          ffplay_found=$(find "$TMPDIR/extract" -type f -name "ffplay" -print -quit || true)
          if [ -n "$ffplay_found" ]; then
            cp "$ffplay_found" "$DEST/ffplay"
            chmod +x "$DEST/ffplay"
            echo "Installed ffplay to $DEST/ffplay"
          fi

          echo "Installed ffmpeg to $DEST/ffmpeg"

          # verification: ensure binary is correct format and show version
          if command -v file >/dev/null 2>&1; then
            echo "file output:"; file "$DEST/ffmpeg" || true
          fi
          echo "ls -l $DEST:"; ls -l "$DEST" || true
          echo "ffmpeg -version (from installed path):"; "$DEST/ffmpeg" -version || true

      - name: Install Tesseract language data (eng.traineddata)
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/NoMercy-Entertainment/NoMercyTesseract/releases/latest"
          echo "Querying $API_URL for traineddata"
          # Prefer direct eng.traineddata asset
          download_url=$(curl -s "$API_URL" | jq -r '.assets[] | select((.name|ascii_downcase) | test("eng\\.traineddata")) | .browser_download_url' | head -n1)
          if [ -z "$download_url" ]; then
            # fallback: any .traineddata asset
            download_url=$(curl -s "$API_URL" | jq -r '.assets[] | select((.name|ascii_downcase) | test("\\.traineddata")) | .browser_download_url' | head -n1)
          fi
          if [ -z "$download_url" ]; then
            # fallback: any archive that might contain tessdata
            download_url=$(curl -s "$API_URL" | jq -r '.assets[] | select((.name|ascii_downcase) | test("tessdata|tesseract|traineddata|zip|tar")) | .browser_download_url' | head -n1)
          fi
          if [ -z "$download_url" ]; then
            echo "No suitable asset found for NoMercyTesseract release"; exit 1
          fi
          echo "Found Tesseract asset: $download_url"
          TMPDIR=$(mktemp -d)
          asset="$TMPDIR/asset"
          curl -L -o "$asset" "$download_url"
          DEST="$HOME/.local/share/NoMercy/root/binaries/tesseract/tessdata"
          mkdir -p "$DEST"
          case "$asset" in
            *.traineddata)
              cp "$asset" "$DEST/eng.traineddata"
              ;;
            *.zip)
              unzip -o "$asset" -d "$TMPDIR/extract"
              ;;
            *.tar.gz|*.tgz)
              mkdir -p "$TMPDIR/extract" && tar -xzf "$asset" -C "$TMPDIR/extract"
              ;;
            *.tar.xz)
              mkdir -p "$TMPDIR/extract" && tar -xJf "$asset" -C "$TMPDIR/extract"
              ;;
            *)
              # unknown file type: try to treat as traineddata
              cp "$asset" "$DEST/eng.traineddata" || true
              ;;
          esac
          # If we extracted, try to locate eng.traineddata within the archive
          if [ -d "$TMPDIR/extract" ]; then
            found=$(find "$TMPDIR/extract" -type f -iname "eng.traineddata" -print -quit || true)
            if [ -z "$found" ]; then
              # sometimes files are under tessdata/eng.traineddata
              found=$(find "$TMPDIR/extract" -type f -iname "*eng*traineddata*" -print -quit || true)
            fi
            if [ -n "$found" ]; then
              cp "$found" "$DEST/eng.traineddata"
            fi
          fi
          if [ ! -f "$DEST/eng.traineddata" ]; then
            echo "eng.traineddata not found after extraction. Listing $TMPDIR/extract:"; ls -R "$TMPDIR/extract" || true; exit 1
          fi
          echo "Installed eng.traineddata to $DEST/eng.traineddata"
          # verification
          echo "ls -l $DEST:"; ls -l "$DEST" || true
          echo "eng.traineddata size:"; wc -c "$DEST/eng.traineddata" || true

      - name: Restore solution
        run: |
          dotnet restore NoMercy.Server.sln

      - name: Determine changed projects and run relevant tests
        shell: bash
        run: |
          set -euo pipefail
          echo "Determining changed files between base and head..."
          # Ensure we have enough git history to diff
          git fetch --no-tags --prune --unshallow || true

          if [ -f "$GITHUB_EVENT_PATH" ]; then
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
              BASE_REF=$(jq -r .pull_request.base.sha < "$GITHUB_EVENT_PATH")
            else
              BASE_REF=$(jq -r .before < "$GITHUB_EVENT_PATH")
            fi
          else
            BASE_REF=$(git rev-parse HEAD^) || true
          fi
          echo "Base ref: $BASE_REF"
            # Ensure we have the relevant commits available; fetch all refs/tags as a robust fallback
            git fetch --all --tags || true
            git fetch origin "$BASE_REF" || true
            git fetch origin "$GITHUB_SHA" || true

          CHANGED_FILES=$(git diff --name-only "$BASE_REF" "$GITHUB_SHA" || true)
          echo "Changed files:"; echo "$CHANGED_FILES"

          # Collect changed source csproj paths
          CHANGED_CSPROJS=$(printf '%s\n' "$CHANGED_FILES" | grep '\.csproj$' | grep '^src/' || true)

          declare -a TESTS_TO_RUN

          # If any test project itself changed or files under tests/ changed, include it
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [[ "$f" == tests/* ]]; then
              # try to find the test project root for this change
              proj_dir=$(echo "$f" | sed -E 's|(tests/[^/]+).*|\1|')
              csproj=$(find "$proj_dir" -maxdepth 1 -type f -name '*.csproj' -print -quit || true)
              if [ -n "$csproj" ]; then
                TESTS_TO_RUN+=("$csproj")
              fi
            fi
          done <<< "$CHANGED_FILES"

          # Inspect all test csproj files and include those that reference changed src projects
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            # skip if already included
            skip=false
            for e in "${TESTS_TO_RUN[@]:-}"; do
              if [ "$e" = "$t" ]; then skip=true; break; fi
            done
            [ "$skip" = true ] && continue

            include=false
            # if test csproj itself was changed, include
            if printf '%s\n' "$CHANGED_FILES" | grep -qF "$t"; then
              include=true
            else
              for c in $CHANGED_CSPROJS; do
                if grep -qi "$(basename "$c")" "$t" 2>/dev/null; then
                  include=true
                  break
                fi
              done
            fi

            if [ "$include" = true ]; then
              TESTS_TO_RUN+=("$t")
            fi
          done < <(find tests -name '*.csproj' -print)

          # Deduplicate
          if [ ${#TESTS_TO_RUN[@]} -gt 0 ]; then
            echo "Running tests for projects:"
            printf '%s\n' "${TESTS_TO_RUN[@]}"
            for p in "${TESTS_TO_RUN[@]}"; do
              echo "dotnet test $p"
              dotnet test "$p" --configuration Debug --verbosity minimal --logger trx --blame-hang-timeout 5m --filter "Category=Unit|Category=ErrorHandling"
            done
          else
            echo "No specific tests detected; running full fast suite."
            dotnet test NoMercy.Server.sln --configuration Debug --verbosity minimal --logger trx --blame-hang-timeout 5m --filter "Category=Unit|Category=ErrorHandling"
          fi

  # Optional coverage job - only runs on master or when manually triggered
  coverage:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Setup .NET Environment
        uses: ./.github/actions/setup-dotnet
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Run tests with coverage
        run: >
          dotnet test NoMercy.Server.sln 
          --configuration Release
          --collect:"XPlat Code Coverage"
          --settings tests/coverletArgs.runsettings
          --verbosity minimal

  # Integration tests - only runs on master, releases, or manually
  integration_tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          fetch-tags: false

      - name: Setup .NET Environment
        uses: ./.github/actions/setup-dotnet
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Run integration tests
        run: >
          dotnet test NoMercy.Server.sln 
          --configuration Debug
          --no-restore
          --verbosity minimal
          --logger trx
          --blame-hang-timeout 10m
          --filter "Category=Integration"

      - name: Run performance tests
        run: >
          dotnet test NoMercy.Server.sln 
          --configuration Release
          --no-restore
          --verbosity minimal
          --logger trx
          --blame-hang-timeout 15m
          --filter "Category=Performance"
